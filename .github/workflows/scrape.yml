name: Scrape Tournaments Daily

on:
  push:
    branches:
      - main
  schedule:
    # Run every day at 03:00 UTC (5am Warsaw time)
    - cron: '0 3 * * *'
  # Also allow manual trigger from GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install scraper dependencies
        run: npm install
        working-directory: scraper

      - name: Run scraper
        run: node scraper.js
        working-directory: scraper

      - name: Commit and push updated data
        run: |
          git config user.name "chess-tour-bot"
          git config user.email "bot@chess-tour.app"
          git add data/tournaments.json
          git diff --staged --quiet || (git commit -m "🤖 Auto-update tournaments $(date -u +%Y-%m-%d)" && git push)
     
