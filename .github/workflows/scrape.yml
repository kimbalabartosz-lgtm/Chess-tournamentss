name: Scrape Tournaments Daily

on:
  schedule:
    # Run every day at 03:00 UTC (5am Warsaw time)
    - cron: '0 3 * * *'
  # Also allow manual trigger from GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper dependencies
        run: npm install
        working-directory: scraper

      - name: Run scraper
        run: node scraper.js
        working-directory: scraper

      - name: Check if data changed
        id: changed
        run: |
          git diff --quiet data/tournaments.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name  "chess-tour-bot"
          git config user.email "bot@chess-tour.app"
          git add data/tournaments.json
          git commit -m "🤖 Auto-update tournaments $(date -u +%Y-%m-%d)"
          git push
